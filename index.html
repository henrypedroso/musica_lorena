<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doutora do Amanhã - Music Experience</title>
    <style>
        :root {
            --primary-color: #e63946;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            overflow-x: hidden;
        }

        /* Imagem de Fundo */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('/img/lorena.png') no-repeat center center fixed;
            background-size: cover;
            z-index: -1;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Player de Áudio Estilizado */
        .audio-player {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            padding: 30px;
            border-radius: 20px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            margin-bottom: 40px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .controls button {
            background: var(--primary-color);
            border: none;
            color: white;
            padding: 15px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            margin: 10px;
            transition: transform 0.2s;
        }

        .controls button:hover {
            transform: scale(1.05);
            background: #f04b58;
        }

        .timeline-container {
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #timeline {
            flex-grow: 1;
            cursor: pointer;
            accent-color: var(--primary-color);
        }

        /* Container do YouTube */
        .video-container {
            width: 100%;
            max-width: 800px;
            aspect-ratio: 16 / 9;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        h1 {
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 30px;
        }
    </style>
</head>
<body>

    <div class="background"></div>

    <div class="container">
        <h1>Doutora do Amanhã</h1>

        <div class="audio-player">
            <h3>Ouça a Música</h3>
            <audio id="myAudio">
                <source src="SEU_AUDIO_AQUI.mp3" type="audio/mpeg">
                Seu navegador não suporta áudio HTML5.
            </audio>
            
            <div class="controls">
                <button onclick="playAudio()">PLAY</button>
                <button onclick="pauseAudio()">PAUSE</button>
            </div>

            <div class="timeline-container">
                <span id="currentTime">0:00</span>
                <input type="range" id="timeline" value="0" max="100">
                <span id="duration">0:00</span>
            </div>
        </div>

        <div class="video-container">
            <iframe 
                src="https://www.youtube.com/embed/ID_DO_VIDEO" 
                title="YouTube video player" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                allowfullscreen>
            </iframe>
        </div>
    </div>

    <script>
        const audio = document.getElementById('myAudio');
        const timeline = document.getElementById('timeline');
        const currentTimeText = document.getElementById('currentTime');
        const durationText = document.getElementById('duration');

        function playAudio() {
            audio.play();
        }

        function pauseAudio() {
            audio.pause();
        }

        // Atualiza a linha do tempo enquanto a música toca
        audio.ontimeupdate = function() {
            const percentage = (audio.currentTime / audio.duration) * 100;
            timeline.value = percentage;
            
            // Formatação de tempo
            currentTimeText.innerText = formatTime(audio.currentTime);
        };

        // Carrega a duração total quando o arquivo está pronto
        audio.onloadedmetadata = function() {
            durationText.innerText = formatTime(audio.duration);
        };

        // Permite clicar na linha do tempo para mudar a posição da música
        timeline.oninput = function() {
            const time = (timeline.value * audio.duration) / 100;
            audio.currentTime = time;
        };

        function formatTime(seconds) {
            let min = Math.floor(seconds / 60);
            let sec = Math.floor(seconds % 60);
            return min + ":" + (sec < 10 ? '0' : '') + sec;
        }
    </script>

</body>
</html>
